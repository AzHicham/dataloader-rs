default_stages: [pre-commit]

repos:
  # ── Python: ruff (lint + format) ─────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Python: ty (type checker) ─────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: ty
        name: ty
        language: system
        entry: ty check src/
        types: [python]
        pass_filenames: false

  # ── Rust: fmt ─────────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        entry: cargo fmt --all --
        types: [rust]
        pass_filenames: false

  # ── Rust: clippy ──────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        language: system
        entry: cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged -- -D warnings
        types: [rust]
        pass_filenames: false

  # ── General: trailing whitespace / EOF ───────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^bench/.*\.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
