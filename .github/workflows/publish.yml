name: Publish

on:
  release:
    types: [published]
  push:
    branches: [dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build Python wheels (always — validates compilation on dev too) ───────
  # 4 combinations: 2 platforms × 2 free-threaded interpreters (3.13t, 3.14t)
  build-wheels:
    name: Wheel (${{ matrix.target }}, ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            python: "3.13t"

          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            python: "3.14t"

          - os: macos-14
            target: aarch64-apple-darwin
            macos_target: '11.0'
            python: "3.13t"

          - os: macos-14
            target: aarch64-apple-darwin
            macos_target: '11.0'
            python: "3.14t"

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.7.8
        with:
          key: publish-${{ matrix.target }}-${{ matrix.python }}

      - uses: astral-sh/setup-uv@v5.4.1

      # On macOS maturin runs natively — install the free-threaded interpreter
      # via uv (setup-python does not provide free-threaded builds).
      # On Linux maturin runs inside the manylinux container which already
      # ships the interpreters; no host-side Python setup is needed.
      - name: Install Python (macOS only)
        if: runner.os == 'macOS'
        run: uv python install ${{ matrix.python }}

      - name: Resolve interpreter path (macOS only)
        if: runner.os == 'macOS'
        id: pypath
        run: echo "path=$(uv python find ${{ matrix.python }})" >> $GITHUB_OUTPUT

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || '' }}
          args: >-
            --release --features python --out dist
            --interpreter ${{ runner.os == 'macOS' && steps.pypath.outputs.path || matrix.python }}
          sccache: true
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target || '' }}

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: wheel-${{ matrix.target }}-${{ matrix.python }}
          path: dist/*.whl

  # ── Publish to PyPI — real releases only ─────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs: build-wheels
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4.2.1
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── Publish to crates.io (dry-run on dev, real on release) ───────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    needs: build-wheels

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.7.8
      - uses: katyo/publish-crates@v2
        with:
          dry-run: ${{ github.event_name != 'release' }}
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
